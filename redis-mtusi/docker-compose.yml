# Учебный Redis для ДЗ 2.4 (уровень 2 — RedisLLMCache)
# Запуск из этой папки: docker compose up -d

services:
  redis-mtusi:
    image: redis:7-alpine
    container_name: redis-mtusi
    ports:
      - "6379:6379"
    volumes:
      - redis-mtusi-data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  redis-mtusi-data:
